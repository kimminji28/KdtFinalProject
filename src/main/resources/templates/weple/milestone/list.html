<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{common/layouts/default_layout :: layout(~{::section}, ~{::head})}">
<head>
    <title>WEPLE - 마일스톤 관리</title>
    <link rel="stylesheet" th:href="@{/css/milestone/milestone-list.css}">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <meta name="_csrf_parameter" th:content="${_csrf.parameterName}"/>
</head>
<body>
<section>
	<script th:src="@{/js/milestone/milestone-list.js}"></script>

    <div class="milestone-page">
        <div class="milestone-page-header">
            <h1 class="milestone-page-title">마일스톤 관리</h1>
            <a th:href="@{/project/milestone/insert(projectId=${projectId})}" class="milestone-add-link">+ 새 마일스톤 추가</a>
        </div>

        <div class="milestone-container" th:each="milestone : ${milestones}">
            
            <div class="milestone-header" th:data-milestone-id="${milestone.milestoneId}">
                
                <div class="view-mode-container" style="display: flex; width: 100%; justify-content: space-between; align-items: flex-start; gap: 20px;">
				    <div class="milestone-title-group" style="display: flex; flex-direction: column; gap: 8px;">
				        <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
				            <span class="milestone-icon">📋</span>
				            <h2 class="milestone-title" style="margin: 0;">
				                <a th:href="@{/project/milestone/detail(projectId=${projectId}, milestoneId=${milestone.milestoneId})}" 
				                   th:text="${milestone.milestoneTitle}">설계</a>
				            </h2>
				            
				            <span class="milestone-badge" 
				                  th:classappend="${milestone.milestoneStatus == 'g2' ? 'badge-success' : 'badge-process'}"
				                  th:text="${milestone.milestoneStatus == 'g2' ? '완료' : '진행 중'}">진행 중</span>
				            
				            <span class="milestone-due-date" 
				                  th:if="${milestone.finishDate != null}"
				                  th:text="${#temporals.format(milestone.finishDate, 'yyyy.MM.dd')} + ' 까지'">2026.03.01 까지</span>
				            
				            <span class="milestone-badge badge-delay-text" 
				                  th:if="${milestone.delayDays > 0}" 
				                  th:text="'지연됨 (D+' + ${milestone.delayDays} + ')'">지연됨 (D+2)</span>
				        </div>
				        
				        
				    </div>
				    <div class="milestone-action-group" style="display: flex; gap: 8px; flex-shrink: 0;">
		            <button type="button" class="milestone-edit-btn" onclick="enableEditMode(this)">편집</button>
		            <button type="button" class="milestone-delete-btn milestone-delete-trigger" 
				            th:data-milestone-id="${milestone.milestoneId}"
				            th:data-milestone-title="${milestone.milestoneTitle}">삭제</button>
		        </div>
				</div>

                <div class="edit-mode-container" style="display: none; width: 100%; flex-direction: column; gap: 12px;">
				    <div style="display: flex; width: 100%; justify-content: space-between; align-items: center; gap: 20px;">
				        <div class="milestone-edit-inputs" style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
				            <input type="text" class="edit-title-input" th:value="${milestone.milestoneTitle}" placeholder="마일스톤명 입력" />
				            
				            <input type="date" class="edit-date-input" th:value="${milestone.finishDate}" />
				            
				            <div style="display: flex; align-items: center; gap: 8px;">
				                <label class="switch-label" style="position: relative; display: inline-block; width: 44px; height: 22px; margin: 0;">
				                    <input type="checkbox" class="edit-status-toggle" 
				                           th:checked="${milestone.milestoneStatus == 'g2'}"
				                           th:disabled="${milestone.progressPercentage < 100}"
				                           onchange="toggleStatusText(this)" />
				                    <span class="slider round"></span>
				                </label>
				                <span class="switch-text" 
				                      th:data-progress="${milestone.progressPercentage}"
				                      th:text="${milestone.progressPercentage < 100 ? '진척도 100% 필수' : (milestone.milestoneStatus == 'g2' ? '완료 처리' : '진행 중')}"
				                      style="font-size: 12px; color: #888; user-select: none;">진척도 100% 필수</span>
				            </div>
				        </div>
				        
				        <div class="milestone-action-btns" style="flex-shrink: 0;">
				            <button type="button" class="milestone-cancel-btn" onclick="cancelEditMode(this)">취소</button>
				            <button type="button" class="milestone-save-btn" onclick="saveMilestone(this)">변경</button>
				        </div>
				    </div>
				    
				    <div style="width: 100%;">
				        <input type="text" class="edit-describe-input" th:value="${milestone.milestoneDescribe}" placeholder="마일스톤 설명 입력" style="width: 100%; box-sizing: border-box; padding: 6px 10px;" />
				    </div>
				</div>
                
            </div>

            <div class="milestone-progress-row" style="display: flex; align-items: center; gap: 15px; width: 100%;">
			    <div class="milestone-progress-bar-wrap" style="flex-shrink: 0; width: 200px; background-color: #e9ecef; height: 8px; border-radius: 4px; overflow: hidden;">
			        <div class="milestone-progress-bar" th:style="'width: ' + ${milestone.progressPercentage} + '%; background-color: #4A90E2; height: 100%;'"></div>
			    </div>
			    
			    <span class="milestone-progress-percent" th:text="${milestone.progressPercentage} + '%'" style="flex-shrink: 0; font-weight: bold; min-width: 40px; color: #333;">100%</span>
			    
			    <span class="milestone-describe" 
			          th:if="${milestone.milestoneDescribe != null}"
			          th:text="${milestone.milestoneDescribe}" 
			          th:title="${milestone.milestoneDescribe}"
			          style="flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #000; font-size: 16px;">
			        마일스톤 설명
			    </span>
			</div>
            
            <div class="milestone-task-summary">
                <span th:text="${milestone.totalTaskCount} + '일감 (' + ${milestone.closedTaskCount} + ' 건 완료 — ' + (${milestone.progressPercentage == 100} ? '모두 완료' : '진행중') + ')'">
                    10일감 (10 건 완료 — 모두 완료)
                </span>
            </div>

            <div class="connected-tasks-section">
                <h3 class="connected-tasks-title">연결된 일감 (최근 5개)</h3>
                
                <div class="task-list-card">
                    <div class="task-item-row" 
                    	th:each="task : ${milestone.recentTasks}"
                    	th:onclick="|location.href='@{/project/task/detail/{id}(id=${task.taskId}, projectId=${projectId})}'|"
                    	style="cursor: pointer;">
                    	
                        <div class="task-col col-id" th:text="'#' + ${task.taskId}">#1</div>
                        
                        <div class="task-col col-type">
                            <span class="task-type-tag" th:text="${task.typeName}">일감유형</span>
                        </div>
                        
                        <div class="task-col col-name">
                            <span  th:text="${task.taskTitle}">일감명</span>
                        </div>
                        
                        <div class="task-col col-progress">
                            <div class="task-mini-bar-wrap">
                                <div class="task-mini-bar" th:style="'width: ' + ${task.taskProgress} + '%'"></div>
                            </div>
                            <span class="task-mini-percent" th:text="${task.taskProgress} + '%'">80%</span>
                        </div>
                        
                        <div class="task-col col-assignee" th:text="${task.taskManager}">담당자명</div>
                        
                        <div class="task-col col-status">
                            <span class="status-dot-group" th:classappend="'status-' + ${task.taskStatus}">
                                <span class="status-dot"></span>
                                <span class="status-text" th:text="${task.defaultDescribe}">진행중</span>
                            </span>
                        </div>
                    </div>

                    <div class="task-empty-row" th:if="${#lists.isEmpty(milestone.recentTasks)}">
                        연결된 일감이 존재하지 않습니다.
                    </div>
                </div>
            </div>
            
            <dialog class="milestone-delete-dialog" id="milestoneDeleteDialog" aria-labelledby="milestoneDeleteDialogTitle">
				    <div class="milestone-delete-dialog-header">
				        <h2 id="milestoneDeleteDialogTitle">마일스톤 삭제</h2>
				        <button class="milestone-dialog-close" type="button" aria-label="닫기" data-milestone-delete-close>&times;</button>
				    </div>
				    <p><strong id="milestoneDeleteName" style="color: #ff4d4f;">마일스톤명</strong>을(를) 삭제합니다. 하위 일감이나 관련 데이터가 함께 영향받을 수 있으며, 이 작업은 되돌릴 수 없습니다.</p>
				    
				    <form th:action="@{/project/milestone/delete}" method="post" id="milestoneDeleteForm">
				        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
				        <input type="hidden" name="projectId" th:value="${projectId}">
				        <input id="milestoneDeleteId" type="hidden" name="milestoneId">
				        
				        <label for="milestoneDeleteConfirmationName">
				            <span id="milestoneDeletePrompt">삭제하려면 마일스톤명을 입력하세요.</span>
				            <input id="milestoneDeleteConfirmationName" name="confirmationName" type="text" required autocomplete="off">
				        </label>
				        
				        <div class="milestone-dialog-actions">
				            <button class="milestone-button milestone-button-secondary" type="button" data-milestone-delete-close>취소</button>
				            <button class="milestone-button milestone-button-danger" type="submit" id="milestoneDeleteSubmitBtn" disabled>삭제 확인</button>
				        </div>
				    </form>
				</dialog>
            
        </div>
    </div>
    
</section>

</body>
</html>
