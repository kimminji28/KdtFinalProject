<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <meta charset="UTF-8">
  <title>WEPLE - 협업툴</title>
  <!-- 정적 파일 경로는 / 로 시작하게 맞춰줍니다 -->
  <link th:href="@{/vendors/bootstrap/dist/css/bootstrap.min.css}" rel="stylesheet">
  <link th:href="@{/vendors/font-awesome/css/font-awesome.min.css}" rel="stylesheet">
  <link th:href="@{/build/css/custom.min.css}" rel="stylesheet">
</head>

<body class="nav-md">
  <div class="container body">
    <div class="main_container">

      <!-- Step 2-①에서 만든 사이드바 조각을 여기에 자동 조립 -->
      <div th:replace="~{common/fragments/sidebar :: sidebarFragment}"></div>

      <!-- Step 2-②에서 만든 상단 nav바 조각을 여기에 자동 조립 -->
      <div th:replace="~{common/fragments/header :: headerFragment}"></div>

      <!-- 메인 콘텐츠 영역 (팀원들이 작업한 본문 내용이 여기 들어옵니다) -->
      <div class="right_col" role="main">
        <div class="x_content">
          <th:block layout:fragment="content"></th:block>
        </div>
      </div>

    </div>
  </div>

  <script th:src="@{/vendors/jquery/dist/jquery.min.js}"></script>
  <script th:src="@{/vendors/bootstrap/dist/js/bootstrap.bundle.min.js}"></script>
  <script th:src="@{/build/js/custom.min.js}"></script>
  
  <!-- 각 페이지별 전용 스크립트가 들어갈 자리 -->
  <th:block layout:fragment="script"></th:block>
</body>
</html>
</body>
</html>
