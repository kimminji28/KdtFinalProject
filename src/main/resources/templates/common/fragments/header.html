<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div th:fragment="headerFragment" class="nav_menu" style="display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 10px 20px; box-sizing: border-box;">
    
    <div class="header-title-area">
	    <h1 class="header-title-left"
	        th:text="${project != null ? project.projectTitle : '　'}">
	    </h1>
	</div>
    
    <div class="header-profile-right" style="margin-left: auto;">
        
        <div class="notif-wrap" id="notifWrap">
            <a href="#" id="notifBellBtn">
                <i class="fa fa-bell"></i>
                <span class="badge bg-red" id="notifUnreadBadge" style="display:none;">0</span>
            </a>
            <div class="notif-dropdown" id="notifDropdown" style="display:none;">
                <!-- /notification/popover 프래그먼트(최근 알림 내역)가 AJAX로 이 안을 채운다 -->
            </div>
        </div>
        
        <img th:src="@{/images/햄스터안경.jpg}" alt="Profile">
        
        <span class="user-name">김위플</span>
        
        <form th:action="@{/logout}" method="post" style="margin: 0; display: flex; align-items: center;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" title="로그아웃" aria-label="로그아웃">
                <i class="fa fa-sign-out"></i>
            </button>
        </form>
        
    </div>

    <!-- 실시간 알림 팝업(토스트)이 우측 하단에 쌓이는 컨테이너 -->
    <div id="notifToastContainer" class="notif-toast-container"></div>

</div>
</body>
</html>
